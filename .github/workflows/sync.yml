name: Upstream Sync

on:
  schedule:
    - cron: "0 * * * *" # Runs every hour
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync with upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # gh repo sync is efficient: it only updates if there are new commits upstream.
          # It won't trigger a new 'Pages' build unless the branch actually changes.
          gh repo sync pu-orfe/boris-hanin --source boris-hanin/boris-hanin.github.io --branch main
